services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: legartis
      POSTGRES_PASSWORD: legartis
      POSTGRES_DB: legartis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legartis -d legartis"]
      interval: 2s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://legartis:legartis@postgres:5432/legartis
      CORS_ORIGINS: '["http://localhost:4200","http://localhost"]'
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  postgres-data:
