<mat-toolbar class="app-toolbar">
  <a routerLink="/" class="brand">
    <mat-icon aria-hidden="true">gavel</mat-icon>
    <span>Legartis</span>
    <span class="brand-sub">Contract Clause Tracker</span>
  </a>
  <span class="spacer"></span>
  <a mat-button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
    <mat-icon>home</mat-icon> Home
  </a>
  <a mat-button routerLink="/contracts" routerLinkActive="active">
    <mat-icon>description</mat-icon> Contracts
  </a>
  <a mat-button routerLink="/clause-types" routerLinkActive="active">
    <mat-icon>category</mat-icon> Clause types
  </a>
  <a mat-flat-button color="primary" routerLink="/upload">
    <mat-icon>upload_file</mat-icon> Upload contract
  </a>
</mat-toolbar>

<main class="page-host">
  <router-outlet />
</main>
